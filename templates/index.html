<!DOCTYPE html>
<html>
<head>
    <title>MetallurgyGPT</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            margin: 0;
        }

        h1 {
            text-align: center;
            padding: 10px;
        }

        #chat {
            height: 80vh;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin: 10px;
            padding: 12px;
            border-radius: 10px;
            max-width: 70%;
        }

        .user {
            background: #38bdf8;
            margin-left: auto;
            color: black;
        }

        .bot {
            background: #1e293b;
        }

        #inputBox {
            display: flex;
            padding: 10px;
            background: #020617;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            margin-left: 10px;
            padding: 10px;
            background: #38bdf8;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<h1>🔥 MetallurgyGPT</h1>

<div id="chat"></div>

<div id="inputBox">
    <input id="query" placeholder="Ask about metallurgy..." />
    <button onclick="ask()">Send</button>
    <button onclick="clearChat()" style="background:#ef4444;">Clear</button>
</div>

<script>
function addMessage(text, type) {
    const chat = document.getElementById("chat");

    const msg = document.createElement("div");
    msg.className = "message " + type;
    msg.innerText = text;

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

async function ask() {
    const query = document.getElementById("query").value;
    if (!query) return;

    addMessage(query, "user");

    document.getElementById("query").value = "";

    addMessage("Thinking...", "bot");

    const res = await fetch("/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({query})
    });

    const data = await res.json();

    // remove "Thinking..."
    document.querySelector(".bot:last-child").remove();

    addMessage(data.answer, "bot");
}
async function clearChat() {
    await fetch("/clear", {method: "POST"});
    document.getElementById("chat").innerHTML = "";
}
</script>

</body>
</html>
